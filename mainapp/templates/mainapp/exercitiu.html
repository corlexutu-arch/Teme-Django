{% extends 'mainapp/headers.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-info text-white py-3">
        <h5 class="mb-0 fw-bold">🐾 Rezultat tema 29: Utilizatori și Animale de Companie</h5>
    </div>
    <div class="card-body">
        <div class="row row-cols-1 row-cols-md-2 g-3">
            {% for nume, numar in useri.items %}
            <div class="col">
                <div class="card h-100 {% if numar > 3 %}border-info bg-light{% else %}border-light{% endif %} shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-dark">{{ nume }}</h5>
                        <p class="card-text text-secondary">Detine un număr de <strong>{{ numar }}</strong> animale de companie.</p>
                        
                        {% if numar > 3 %}
                        <div class="alert alert-info py-2 px-3 mb-0 mt-2 fw-semibold" role="alert">
                            🦮 Si de aia sunt fericit!
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
