{% extends 'mainapp/headers.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0 rounded-3 overflow-hidden">
            <div class="bg-primary p-4 text-white text-center">
                <span class="text-uppercase tracking-wider small opacity-75">Despre film</span>
                <h2 class="fw-bold mt-1 mb-0">{{ movie.title }}</h2>
            </div>
            <div class="card-body p-4 bg-white">
                <div class="row g-4">
                    <div class="col-sm-6 border-bottom pb-2">
                        <span class="text-muted d-block small">Gen</span>
                        <strong class="text-dark fs-5">{{ movie.genre }}</strong>
                    </div>
                    <div class="col-sm-6 border-bottom pb-2">
                        <span class="text-muted d-block small">Data Lansarii</span>
                        <strong class="text-dark fs-5">{{ movie.release_date.year }}</strong>
                    </div>
                    <div class="col-12 mt-3">
                        <span class="text-muted d-block small mb-2">Descriere / Sinopsis</span>
                        <div class="p-3 bg-light rounded border border-light text-secondary lh-lg">
                            {{ movie.description }}
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-light p-3 d-flex justify-content-between">
                <a href="{% url 'homepage' %}" class="btn btn-outline-secondary btn-sm">🏠 Pagina de Start</a>
                <a href="{% url 'movies' %}" class="btn btn-primary btn-sm">🎬 Lista de Filme</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
