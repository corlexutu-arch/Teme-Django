{% extends 'mainapp/headers.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0 rounded-3 overflow-hidden">
            <div class="bg-success p-4 text-white text-center">
                <span class="text-uppercase tracking-wider small opacity-75">Date carte</span>
                <h2 class="fw-bold mt-1 mb-0">{{ book.title }}</h2>
            </div>
            <div class="card-body p-4 bg-white">
                <div class="row g-4">
                    <div class="col-sm-6 border-bottom pb-2">
                        <span class="text-muted d-block small">Autor</span>
                        <strong class="text-dark fs-5">{{ book.author }}</strong>
                    </div>
                    <div class="col-sm-6 border-bottom pb-2">
                        <span class="text-muted d-block small">Categorie / Gen</span>
                        <strong class="text-dark fs-5">{{ book.category }}</strong>
                    </div>
                    <div class="col-12">
                        <span class="text-muted d-block small">Data Publicarii</span>
                        <strong class="text-dark fs-5">{{ book.release_date.year }}</strong>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-light p-3 d-flex justify-content-between">
                <a href="{% url 'books' %}" class="btn btn-outline-success btn-sm">📚 Lista carti</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
